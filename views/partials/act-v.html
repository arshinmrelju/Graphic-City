<section id="act-v" class="relative min-h-screen flex flex-col items-center justify-center px-8 py-32 scroll-snap-child bg-stone-50 dark:bg-stone-950" aria-label="Trusted clients">

  <div class="w-full max-w-xl mx-auto">
    <h2 class="sr-only">Trusted by</h2>

    <div x-data="{ visible: false }" x-init="setTimeout(() => visible = true, 100)">
      <template x-for="(client, idx) in [
        { name: 'Stripe', href: '/work/stripe' },
        { name: 'Linear', href: '/work/linear' },
        { name: 'Notion', href: '/work/notion' },
        { name: 'Figma', href: '/work/figma' },
        { name: 'Patagonia', href: '/work/patagonia' },
        { name: 'Aesop', href: '/work/aesop' }
      ]" :key="client.name">
        <a :href="client.href"
           class="group block font-display text-3xl md:text-4xl lg:text-5xl text-stone-400 dark:text-stone-500 hover:text-core-black dark:hover:text-core-white transition-all duration-200 ease-out py-3 md:py-4 border-b border-stone-200 dark:border-stone-800 last:border-b-0 focus-ring rounded-sm"
           x-show="visible"
           x-transition:enter.duration.600ms
           x-transition:enter.delay="(idx * 100)"
           x-text="client.name"
           :aria-label="'View case study for ' + client.name">
        </a>
      </template>
    </div>

    <p class="mt-16 font-body text-sm text-stone-400 dark:text-stone-500 text-center text-balance">
      We partner with organizations that care as much as we do.
    </p>
  </div>

</section>
